services:
  postgres:
    image: postgres:16-alpine
    container_name: badminton-lab-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-badminton_lab}
      POSTGRES_USER: ${DB_USER:-badminton}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-badminton}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-badminton} -d ${DB_NAME:-badminton_lab}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
