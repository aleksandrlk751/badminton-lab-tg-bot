spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

badminton-lab:
  metrics:
    half-life-days: 180
    early-decay-max: 0.8
    early-decay-power: 0.5
    form-k: 0.5
    s-ref: 1.0
    b-max: 20.0
    s0: 1.0
    w1: 0.4
    w2: 0.3
    w3: 0.3
    d-scale: 10.0
    partner-history-months: 12
    stability-surprise-threshold: 10.0
    stability-zones:
      zone2-min: 60
      zone3-min: 75
      zone4-min: 85
      zone5-min: 90
    game-accent:
      half-life-days: 180
      early-decay-max: 0.8
      early-decay-power: 0.5
      min-weight-sum: 3.0
      display-window-days: 180
