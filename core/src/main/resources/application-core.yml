spring:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

badminton-lab:
  metrics:
    half-life-days: 180
    early-decay-max: 0.8
    early-decay-power: 0.5
    form-k: 0.5
    s-ref: 1.0
    b-max: 20.0
    s0: 1.0
    w1: 0.35
    w2: 0.25
    w3: 0.25
    w4: 0.10
    w5: 0.05
    d-scale: 10.0
    partner-history-months: 12
    s-ref-partner: 1.0
    partner-form-scale: 10.0
    partner-form-stability:
      super-stable: 1.1
      stable: 1.0
      middle: 0.85
      unstable: 0.7
      very-unstable: 0.5
    stability-surprise-threshold: 11.5
    stability-zones:
      zone2-min: 70
      zone3-min: 80
      zone4-min: 86
      zone5-min: 92
    game-accent:
      half-life-days: 180
      early-decay-max: 0.8
      early-decay-power: 0.5
      min-weight-sum: 3.0
      display-window-days: 180
